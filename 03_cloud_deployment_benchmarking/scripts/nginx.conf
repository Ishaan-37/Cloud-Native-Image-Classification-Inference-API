# nginx.conf — Reverse proxy for the Medical Image Inference API
# ─────────────────────────────────────────────────────────────
# Place this file at /etc/nginx/nginx.conf on the EC2 instance.
#
# What this does:
#   - Exposes the API on port 80 (standard HTTP)
#   - Forwards requests internally to the Docker container on port 8000
#   - Adds sensible timeouts and upload size limits for image files
#
# Install nginx on Ubuntu:  sudo apt-get install -y nginx
# Reload config:            sudo nginx -s reload

events {
    worker_connections 1024;
}

http {

    # Increase default upload limit (images can be several MB)
    client_max_body_size 20M;

    # Upstream = the Docker container running FastAPI
    upstream inference_api {
        server 127.0.0.1:8000;
        keepalive 32;           # Reuse connections (reduces handshake overhead)
    }

    server {
        listen 80;
        server_name _;          # Matches any hostname / IP

        # ── Proxy all requests to FastAPI ─────────────────────────────────────
        location / {
            proxy_pass         http://inference_api;
            proxy_http_version 1.1;

            # Required headers so FastAPI knows the real client IP
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep-alive for upstream
            proxy_set_header   Connection        "";

            # Timeouts — inference can take a few seconds
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # ── Health check endpoint for AWS ELB / ALB ───────────────────────────
        location /health {
            proxy_pass http://inference_api/health;
            access_log off;     # Don't pollute logs with health-check noise
        }

        # ── Block access to hidden files (.env, .git, etc.) ───────────────────
        location ~ /\. {
            deny all;
        }
    }
}
